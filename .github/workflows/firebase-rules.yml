name: Deploy Firestore Rules

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"
  workflow_dispatch:

jobs:
  deploy-rules:
    name: Deploy Firestore & Storage Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g firebase-tools
      - name: Deploy rules (skips gracefully without FIREBASE_TOKEN)
        continue-on-error: true
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "FIREBASE_TOKEN secret not set — skipping rules deploy."
            exit 0
          fi
          firebase deploy --only firestore:rules,firestore:indexes,storage --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
